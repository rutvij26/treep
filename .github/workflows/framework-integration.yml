name: Framework Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  node-esm-cjs:
    name: Node.js (ESM + CJS)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 'latest']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Setup test project
        run: |
          mkdir -p .test-node
          cd .test-node
          echo '{"name":"test","version":"1.0.0","type":"module","dependencies":{"treep":"latest"}}' > package.json
          npm install

      - name: Test ESM import
        working-directory: .test-node
        run: |
          cat > test.mjs <<'EOF'
          import { Graph, BFS, shortestPath } from 'treep';
          const g = new Graph();
          const a = g.addLeaf('A', 'A');
          const b = g.addLeaf('B', 'B');
          g.addBranch('A', 'B');
          const visited = [];
          BFS(a, (leaf) => visited.push(leaf.value));
          if (visited.length !== 2) throw new Error('BFS failed');
          console.log('✅ Node.js ESM test passed');
          EOF
          node test.mjs

      - name: Test CJS import
        working-directory: .test-node
        run: |
          cat > test.cjs <<'EOF'
          const { Graph, BFS } = require('treep');
          const g = new Graph();
          const a = g.addLeaf('A', 'A');
          const b = g.addLeaf('B', 'B');
          g.addBranch('A', 'B');
          const visited = [];
          BFS(a, (leaf) => visited.push(leaf.value));
          if (visited.length !== 2) throw new Error('BFS failed');
          console.log('✅ Node.js CJS test passed');
          EOF
          node test.cjs

      - name: Cleanup
        if: always()
        run: rm -rf .test-node

  browser:
    name: Browser (ESM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Setup test project
        run: |
          mkdir -p .test-browser
          cd .test-browser
          echo '{"name":"test","version":"1.0.0","type":"module","dependencies":{"treep":"latest","playwright":"latest"}}' > package.json
          npm install
          npx playwright install chromium

      - name: Create browser test HTML
        working-directory: .test-browser
        run: |
          cat > test.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head><title>Treep Browser Test</title></head>
          <body>
            <script type="module">
              import { Graph, BFS } from './node_modules/treep/dist/esm/index.js';
              const g = new Graph();
              const a = g.addLeaf('A', 'A');
              const b = g.addLeaf('B', 'B');
              g.addBranch('A', 'B');
              const visited = [];
              BFS(a, (leaf) => visited.push(leaf.value));
              if (visited.length !== 2) throw new Error('BFS failed');
              console.log('✅ Browser test passed');
              document.body.innerHTML = '<h1>✅ Browser test passed</h1>';
              window.testPassed = true;
            </script>
          </body>
          </html>
          EOF

      - name: Run browser test
        working-directory: .test-browser
        run: |
          cat > test-browser.mjs <<'EOF'
          import { chromium } from 'playwright';
          const browser = await chromium.launch();
          const page = await browser.newPage();
          const url = 'file://' + process.cwd() + '/test.html';
          await page.goto(url);
          await page.waitForFunction(() => window.testPassed === true, { timeout: 10000 });
          console.log('✅ Browser integration test passed');
          await browser.close();
          EOF
          node test-browser.mjs

      - name: Cleanup
        if: always()
        run: rm -rf .test-browser

  react:
    name: React (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Create React app
        run: |
          mkdir -p .test-react
          cd .test-react
          npx create-react-app@latest . --template typescript --skip-git
          npm install treep@latest

      - name: Create React test component
        working-directory: .test-react/src
        run: |
          cat > TreepTest.tsx <<'EOF'
          import { useEffect } from 'react';
          import { Graph, BFS } from 'treep';

          export const TreepTest = () => {
            useEffect(() => {
              const g = new Graph();
              const a = g.addLeaf('A', 'A');
              const b = g.addLeaf('B', 'B');
              g.addBranch('A', 'B');
              const visited: string[] = [];
              BFS(a, (leaf) => visited.push(leaf.value as string));
              if (visited.length !== 2) throw new Error('BFS failed');
              console.log('✅ React integration test passed');
            }, []);
            return null;
          };
          EOF

      - name: Create React test file
        working-directory: .test-react/src
        run: |
          cat > TreepTest.test.tsx <<'EOF'
          import { render } from '@testing-library/react';
          import { TreepTest } from './TreepTest';

          test('treep works in React', () => {
            const consoleSpy = jest.spyOn(console, 'log').mockImplementation();
            render(<TreepTest />);
            expect(consoleSpy).toHaveBeenCalledWith('✅ React integration test passed');
            consoleSpy.mockRestore();
          });
          EOF

      - name: Run React tests
        working-directory: .test-react
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Cleanup
        if: always()
        run: rm -rf .test-react

  vue:
    name: Vue (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Create Vue app
        run: |
          mkdir -p .test-vue
          cd .test-vue
          npm create vue@latest . -- --typescript --no-install
          npm install
          npm install treep@latest

      - name: Create Vue test component
        working-directory: .test-vue/src/components
        run: |
          cat > TreepTest.vue <<'EOF'
          <script setup lang="ts">
          import { onMounted } from 'vue';
          import { Graph, BFS } from 'treep';

          onMounted(() => {
            const g = new Graph();
            const a = g.addLeaf('A', 'A');
            const b = g.addLeaf('B', 'B');
            g.addBranch('A', 'B');
            const visited: string[] = [];
            BFS(a, (leaf) => visited.push(leaf.value as string));
            if (visited.length !== 2) throw new Error('BFS failed');
            console.log('✅ Vue integration test passed');
          });
          </script>
          <template>
            <div>Treep Test</div>
          </template>
          EOF

      - name: Create Vue test file
        working-directory: .test-vue
        run: |
          cat > src/components/TreepTest.spec.ts <<'EOF'
          import { mount } from '@vue/test-utils';
          import TreepTest from './TreepTest.vue';
          import { describe, it, expect, vi } from 'vitest';

          describe('TreepTest', () => {
            it('treep works in Vue', () => {
              const consoleSpy = vi.spyOn(console, 'log').mockImplementation(() => {});
              mount(TreepTest);
              expect(consoleSpy).toHaveBeenCalledWith('✅ Vue integration test passed');
              consoleSpy.mockRestore();
            });
          });
          EOF

      - name: Run Vue tests
        working-directory: .test-vue
        run: npm run test:unit

      - name: Cleanup
        if: always()
        run: rm -rf .test-vue

  angular:
    name: Angular (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Create Angular app
        run: |
          mkdir -p .test-angular
          cd .test-angular
          npx @angular/cli@latest new . --routing=false --style=css --skip-git --package-manager=npm --skip-install
          npm install
          npm install treep@latest

      - name: Create Angular test component
        working-directory: .test-angular/src/app
        run: |
          cat > treep-test.component.ts <<'EOF'
          import { Component, OnInit } from '@angular/core';
          import { Graph, BFS } from 'treep';

          @Component({
            selector: 'app-treep-test',
            template: '<div>Treep Test</div>'
          })
          export class TreepTestComponent implements OnInit {
            ngOnInit() {
              const g = new Graph();
              const a = g.addLeaf('A', 'A');
              const b = g.addLeaf('B', 'B');
              g.addBranch('A', 'B');
              const visited: string[] = [];
              BFS(a, (leaf) => visited.push(leaf.value as string));
              if (visited.length !== 2) throw new Error('BFS failed');
              console.log('✅ Angular integration test passed');
            }
          }
          EOF

      - name: Create Angular test file
        working-directory: .test-angular/src/app
        run: |
          cat > treep-test.component.spec.ts <<'EOF'
          import { ComponentFixture, TestBed } from '@angular/core/testing';
          import { TreepTestComponent } from './treep-test.component';

          describe('TreepTestComponent', () => {
            let component: TreepTestComponent;
            let fixture: ComponentFixture<TreepTestComponent>;

            beforeEach(async () => {
              await TestBed.configureTestingModule({
                declarations: [TreepTestComponent]
              }).compileComponents();
            });

            beforeEach(() => {
              fixture = TestBed.createComponent(TreepTestComponent);
              component = fixture.componentInstance;
            });

            it('treep works in Angular', () => {
              const consoleSpy = spyOn(console, 'log');
              fixture.detectChanges();
              expect(consoleSpy).toHaveBeenCalledWith('✅ Angular integration test passed');
            });
          });
          EOF

      - name: Run Angular tests
        working-directory: .test-angular
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Cleanup
        if: always()
        run: rm -rf .test-angular

  react-native:
    name: React Native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Setup test project
        run: |
          mkdir -p .test-rn
          cd .test-rn
          echo '{"name":"test","version":"1.0.0","type":"module","dependencies":{"treep":"latest"}}' > package.json
          npm install

      - name: Test React Native compatibility
        working-directory: .test-rn
        run: |
          cat > test.mjs <<'EOF'
          // React Native can use ESM with metro bundler
          // Test that treep can be imported and used
          import { Graph, BFS } from 'treep';
          const g = new Graph();
          const a = g.addLeaf('A', 'A');
          const b = g.addLeaf('B', 'B');
          g.addBranch('A', 'B');
          const visited = [];
          BFS(a, (leaf) => visited.push(leaf.value));
          if (visited.length !== 2) throw new Error('BFS failed');
          console.log('✅ React Native integration test passed');
          EOF
          node test.mjs

      - name: Cleanup
        if: always()
        run: rm -rf .test-rn
